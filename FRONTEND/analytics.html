<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K2.OS Analytics Dashboard</title>
    <link rel="stylesheet" href="analytics.css">
</head>
<body>

<div class="container">

    <h1>📊 K2.OS Analytics Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>✅ Tasks Completed</h2>
            <p id="completed">24</p>
        </div>

        <div class="card">
            <h2>⏳ Pending Tasks</h2>
            <p id="pending">6</p>
        </div>

        <div class="card">
            <h2>📈 Weekly Productivity</h2>
            <p id="productivity">89%</p>
        </div>

        <div class="card">
            <h2>😊 Mood Trends</h2>
            <p id="mood">Happy 😊</p>
        </div>

        <div class="card">
            <h2>📖 Journal Frequency</h2>
            <p id="journal">5 Entries This Week</p>
        </div>

    </div>

    <button id="refreshBtn">Update Analytics</button>

</div>

<script src="analytics.js"></script>

</body>
</html>
